services:
  postgres:
    image: postgres:16-alpine
    container_name: aim_tank_integrity_postgres
    environment:
      POSTGRES_USER: aim_user
      POSTGRES_PASSWORD: aim_password
      POSTGRES_DB: aim_tank_integrity
    ports:
      - "5433:5432"
    volumes:
      - aim_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aim_user -d aim_tank_integrity"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: aim_tank_integrity_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - aim_minio_data:/data

volumes:
  aim_pg_data:
  aim_minio_data:
