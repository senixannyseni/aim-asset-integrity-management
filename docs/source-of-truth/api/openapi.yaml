components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      required:
      - error
      - request_id
      properties:
        error:
          type: object
          required:
          - code
          - message
          properties:
            code:
              type: string
              example: VALIDATION_FAILED
            message:
              type: string
              example: Evidence link is required before approval.
            details:
              type: array
              items:
                type: object
            audit_event_generated:
              type: string
              example: error.logged
        request_id:
          type: string
          example: req_123456
    StandardResponse:
      type: object
      required:
      - success
      - data
      - audit_event_id
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          additionalProperties: true
        audit_event_id:
          type: string
          format: uuid
          nullable: true
        workflow_event_id:
          type: string
          format: uuid
          nullable: true
        message:
          type: string
          example: Operation completed.
    PagedResponse:
      type: object
      required:
      - success
      - data
      - pagination
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        pagination:
          type: object
          properties:
            page:
              type: integer
            page_size:
              type: integer
            total:
              type: integer
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    LoginResponse:
      type: object
      required:
      - access_token
      - token_type
      - expires_in
      - user
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 3600
        user:
          $ref: '#/components/schemas/User'
    User:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        display_name:
          type: string
        user_status:
          type: string
          enum:
          - active
          - inactive
          - locked
          - invited
        roles:
          type: array
          items:
            type: string
    CreateUserRequest:
      type: object
      required:
      - email
      - full_name
      - role_codes
      properties:
        email:
          type: string
          format: email
        full_name:
          type: string
        display_name:
          type: string
        role_codes:
          type: array
          items:
            type: string
    Role:
      type: object
      properties:
        role_id:
          type: string
          format: uuid
        role_code:
          type: string
        role_name:
          type: string
        description:
          type: string
        role_status:
          type: string
          enum:
          - active
          - inactive
    RoleCreateRequest:
      type: object
      required:
      - role_code
      - role_name
      properties:
        role_code:
          type: string
        role_name:
          type: string
        description:
          type: string
        permission_codes:
          type: array
          items:
            type: string
    AssetCreateRequest:
      type: object
      required:
      - asset_tag
      - asset_type
      - site_name
      properties:
        asset_tag:
          type: string
          example: T-02
        asset_name:
          type: string
        asset_type:
          type: string
          enum:
          - atmospheric_storage_tank
        site_name:
          type: string
        area:
          type: string
        service_fluid:
          type: string
        design_code_reference:
          type: string
          enum:
          - API 650
          - unknown
          - other
        design_capacity_m3:
          type: number
          format: decimal
        material:
          type: string
        construction_year:
          type: integer
        asset_status:
          type: string
          enum:
          - active
          - inactive
          - retired
          - under_review
          default: active
    Asset:
      allOf:
      - $ref: '#/components/schemas/AssetCreateRequest'
      - type: object
        properties:
          asset_id:
            type: string
            format: uuid
          created_at:
            type: string
            format: date-time
          updated_at:
            type: string
            format: date-time
          created_by:
            type: string
            format: uuid
          updated_by:
            type: string
            format: uuid
    ApprovalRequest:
      type: object
      required:
      - approval_status
      - review_comment
      properties:
        approval_status:
          type: string
          enum:
          - approved
          - rejected
        review_comment:
          type: string
        reviewed_by:
          type: string
          format: uuid
    EvidenceFileMetadataRequest:
      type: object
      required:
      - storage_uri
      - original_file_name
      - file_type
      - checksum_sha256
      - file_size_bytes
      - source_system
      properties:
        storage_uri:
          type: string
        original_file_name:
          type: string
        file_type:
          type: string
          enum:
          - pdf
          - image
          - spreadsheet
          - csv
          - ndt_export
          - drawing
          - other
        mime_type:
          type: string
        checksum_sha256:
          type: string
          minLength: 64
          maxLength: 64
        file_size_bytes:
          type: integer
          minimum: 1
        source_system:
          type: string
          enum:
          - AIM
          - import
          - n8n_notification
          default: AIM
    EvidenceFile:
      allOf:
      - $ref: '#/components/schemas/EvidenceFileMetadataRequest'
      - type: object
        properties:
          evidence_file_id:
            type: string
            format: uuid
          uploaded_by:
            type: string
            format: uuid
          uploaded_at:
            type: string
            format: date-time
          evidence_status:
            type: string
            enum:
            - uploaded
            - verified
            - rejected
            - archived
    EvidenceLinkRequest:
      type: object
      required:
      - evidence_file_id
      - entity_type
      - entity_id
      - evidence_code
      properties:
        evidence_file_id:
          type: string
          format: uuid
        entity_type:
          type: string
          enum:
          - asset
          - inspection
          - finding
          - extraction_field
          - staging_record
          - ndt_measurement
          - thickness_reading
          - calculation_input
          - calculation_output
          - integrity_decision
          - report_version
          - internal_work_order
        entity_id:
          type: string
          format: uuid
        page_no:
          type: integer
          minimum: 1
        coordinate_ref:
          type: string
        evidence_code:
          type: string
        description:
          type: string
    EvidenceLink:
      allOf:
      - $ref: '#/components/schemas/EvidenceLinkRequest'
      - type: object
        properties:
          evidence_link_id:
            type: string
            format: uuid
          linked_by:
            type: string
            format: uuid
          created_at:
            type: string
            format: date-time
    InspectionCreateRequest:
      type: object
      required:
      - asset_id
      - inspection_code
      - inspection_type
      - inspection_start_date
      properties:
        asset_id:
          type: string
          format: uuid
        inspection_code:
          type: string
        inspection_type:
          type: string
          enum:
          - external
          - internal
          - UT_thickness
          - API_653_review
          - other
        inspection_start_date:
          type: string
          format: date
        inspection_end_date:
          type: string
          format: date
        lead_inspector_id:
          type: string
          format: uuid
        engineer_id:
          type: string
          format: uuid
        report_due_date:
          type: string
          format: date
    Inspection:
      allOf:
      - $ref: '#/components/schemas/InspectionCreateRequest'
      - type: object
        properties:
          inspection_id:
            type: string
            format: uuid
          inspection_status:
            type: string
            enum:
            - draft
            - in_progress
            - submitted
            - engineering_review
            - approved
            - rejected
            - closed
    ExtractionJobCreateRequest:
      type: object
      required:
      - inspection_id
      - evidence_file_id
      - ai_model_name
      - ai_model_version
      properties:
        inspection_id:
          type: string
          format: uuid
        evidence_file_id:
          type: string
          format: uuid
        ai_model_name:
          type: string
        ai_model_version:
          type: string
        extraction_scope:
          type: array
          items:
            type: string
            enum:
            - asset
            - inspection
            - ndt_ut
            - calculation_inputs
            - findings
    ExtractionJob:
      allOf:
      - $ref: '#/components/schemas/ExtractionJobCreateRequest'
      - type: object
        properties:
          extraction_job_id:
            type: string
            format: uuid
          job_status:
            type: string
            enum:
            - queued
            - running
            - completed
            - failed
            - cancelled
          submitted_by:
            type: string
            format: uuid
    ExtractionFieldApprovalRequest:
      type: object
      required:
      - review_status
      - review_comment
      properties:
        review_status:
          type: string
          enum:
          - accepted_to_staging
          - rejected
          - needs_review
        review_comment:
          type: string
        corrected_value:
          type: string
        corrected_unit:
          type: string
          enum:
          - mm
          - m
          - year
          - date
          - text
          - percent
          - none
    StagingPromotionRequest:
      type: object
      required:
      - staging_record_id
      - target_table_name
      - target_field_name
      - approved_value
      properties:
        staging_record_id:
          type: string
          format: uuid
        target_table_name:
          type: string
          enum:
          - assets
          - asset_components
          - inspections
          - inspection_findings
          - ndt_measurements
          - cml_points
          - thickness_readings
          - calculation_inputs
        target_field_name:
          type: string
        approved_value:
          type: string
        approved_unit:
          type: string
        evidence_link_id:
          type: string
          format: uuid
        promotion_comment:
          type: string
    NdtMeasurementCreateRequest:
      type: object
      required:
      - inspection_id
      - asset_id
      - method_type
      - measurement_date
      properties:
        inspection_id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
        component_id:
          type: string
          format: uuid
        method_type:
          type: string
          enum:
          - UT_THICKNESS
          default: UT_THICKNESS
        measurement_date:
          type: string
          format: date
        technician_name:
          type: string
        device_id:
          type: string
        evidence_link_id:
          type: string
          format: uuid
        readings:
          type: array
          items:
            $ref: '#/components/schemas/ThicknessReadingInput'
    ThicknessReadingInput:
      type: object
      required:
      - component_id
      - current_thickness_mm
      - reading_date
      - evidence_link_id
      properties:
        cml_point_id:
          type: string
          format: uuid
        component_id:
          type: string
          format: uuid
        course_no:
          type: integer
          minimum: 1
        previous_thickness_mm:
          type: number
        current_thickness_mm:
          type: number
        minimum_required_thickness_mm:
          type: number
        reading_date:
          type: string
          format: date
        evidence_link_id:
          type: string
          format: uuid
        unit:
          type: string
          enum:
          - mm
          default: mm
    CalculationRunRequest:
      type: object
      required:
      - asset_id
      - inspection_id
      - formula_version_id
      - calculation_type
      - inputs
      properties:
        asset_id:
          type: string
          format: uuid
        inspection_id:
          type: string
          format: uuid
        formula_version_id:
          type: string
          format: uuid
        calculation_type:
          type: string
          enum:
          - corrosion_rate_remaining_life_mvp
        calculation_basis:
          type: string
          example: AIM MVP formula registry only. Engineering review required before final use.
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/CalculationInputItem'
    CalculationInputItem:
      type: object
      required:
      - source_reading_id
      - previous_thickness_mm
      - current_thickness_mm
      - minimum_required_thickness_mm
      - years_between_inspections
      - evidence_link_id
      properties:
        source_reading_id:
          type: string
          format: uuid
        component_id:
          type: string
          format: uuid
        course_no:
          type: integer
        previous_thickness_mm:
          type: number
        current_thickness_mm:
          type: number
        minimum_required_thickness_mm:
          type: number
        years_between_inspections:
          type: number
        evidence_link_id:
          type: string
          format: uuid
    CalculationRun:
      type: object
      properties:
        calculation_run_id:
          type: string
          format: uuid
        run_status:
          type: string
          enum:
          - draft
          - validated
          - run
          - review_required
          - approved
          - rejected
        disclaimer:
          type: string
          example: Engineering review required before final use.
        outputs:
          type: array
          items:
            type: object
    CalculationApprovalRequest:
      type: object
      required:
      - approval_status
      - review_comment
      properties:
        approval_status:
          type: string
          enum:
          - approved
          - rejected
        review_comment:
          type: string
        reviewed_output_ids:
          type: array
          items:
            type: string
            format: uuid
        evidence_link_id:
          type: string
          format: uuid
    IntegrityDecisionCreateRequest:
      type: object
      required:
      - asset_id
      - inspection_id
      - decision_status
      - decision_summary
      - decision_by
      - evidence_link_id
      properties:
        asset_id:
          type: string
          format: uuid
        inspection_id:
          type: string
          format: uuid
        calculation_run_id:
          type: string
          format: uuid
        decision_status:
          type: string
          enum:
          - fit_for_service
          - monitor
          - repair_required
          - restrict_service
          - out_of_scope
          - pending_review
        decision_summary:
          type: string
        required_action:
          type: string
        decision_by:
          type: string
          format: uuid
        evidence_link_id:
          type: string
          format: uuid
    IntegrityDecision:
      allOf:
      - $ref: '#/components/schemas/IntegrityDecisionCreateRequest'
      - type: object
        properties:
          decision_id:
            type: string
            format: uuid
          approval_status:
            type: string
            enum:
            - draft
            - submitted
            - approved
            - rejected
    ReportGenerateRequest:
      type: object
      required:
      - asset_id
      - inspection_id
      - report_template_id
      - prepared_by
      properties:
        asset_id:
          type: string
          format: uuid
        inspection_id:
          type: string
          format: uuid
        report_template_id:
          type: string
          format: uuid
        prepared_by:
          type: string
          format: uuid
        include_sections:
          type: array
          items:
            type: string
            enum:
            - executive_summary
            - asset_data
            - inspection_scope
            - evidence
