openapi: 3.0.3
info:
  title: AIM+n8n MVP API
  version: 0.1.0
  description: Implementation-ready API contract for the AIM+n8n MVP. AIM is the system of record; PostgreSQL stores final
    structured engineering data; object storage stores original evidence; n8n orchestrates workflow only and must not write
    directly to PostgreSQL. AI extraction output must go to staging first. Human engineering review/approval gates are mandatory
    for final engineering data, calculations, integrity decisions, and issued reports.
servers:
- url: https://api.aim.local
  description: Local/development placeholder
tags:
- name: Auth
- name: Users and Roles
- name: Assets
- name: Evidence
- name: Inspections
- name: AI Extraction
- name: Staging Review
- name: NDT
- name: Calculations
- name: Integrity Decisions
- name: Reports
- name: Dashboard
- name: Work Orders
- name: Workflow Events
- name: Audit
- name: Error Logs
paths:
  /api/auth/login:
    post:
      tags:
      - Auth
      summary: Login
      description: Authenticate user and return an access token. Audit event captures login success/failure without storing
        password.
      security:
      - bearerAuth: []
      x-permission-required: public
      x-audit-event-generated: auth.login
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid request payload or parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid authentication token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated user lacks required permission.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Requested entity was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation failed or workflow gate blocked the operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Unexpected server error. AIM must create error_logs record when applicable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
