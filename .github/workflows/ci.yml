name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aim_user
          POSTGRES_PASSWORD: aim_password
          POSTGRES_DB: aim_tank_integrity
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:ci
      - run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://aim_user:aim_password@localhost:5432/aim_tank_integrity
          AUTH_JWT_SECRET: ci-secret-at-least-32-characters-long
      - run: pnpm db:seed
        env:
          DATABASE_URL: postgresql://aim_user:aim_password@localhost:5432/aim_tank_integrity
          AUTH_JWT_SECRET: ci-secret-at-least-32-characters-long
