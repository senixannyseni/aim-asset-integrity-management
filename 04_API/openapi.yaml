  /api/v1/work-orders:
    get:
      tags:
      - Work Orders
      summary: List internal AIM work orders
      description: List internal work orders. This is the MVP fallback and does not read external SAP/Maximo/CMMS.
      security:
      - bearerAuth: []
      x-permission-required: work_order.read
      x-audit-event-generated: none
      x-source-of-truth-boundary: AIM is the system of record. Internal work orders are stored in AIM PostgreSQL; no external CMMS call is made.
      responses:
        '200':
          description: Internal work order list
    post:
      tags:
      - Work Orders
      summary: Create internal AIM work order fallback from approved integrity decision or issued report action
      description: Create an internal AIM work order only after integrity/report gates pass. Work order creation from unapproved integrity decision is blocked unless preliminary_internal_mode is explicitly true and internally controlled. external_cmms_reference remains null/omitted.
      security:
      - bearerAuth: []
      x-permission-required: work_order.create
      x-audit-event-generated: INTERNAL_WORK_ORDER_CREATED or INTERNAL_WORK_ORDER_CREATION_BLOCKED
      x-human-review-required: true
      x-evidence-link-required: true
      x-source-of-truth-boundary: AIM internal work order fallback only. No SAP/Maximo/CMMS integration is implemented in Phase 1.6.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalWorkOrderCreateRequest'
      responses:
        '201':
          description: Internal work order created
        '409':
          $ref: '#/components/responses/GateBlocked'
  /api/v1/work-orders/{workOrderId}:
    get:
      tags:
      - Work Orders
      summary: Get internal AIM work order detail
      description: Read an internal AIM work order fallback record and its gate checklist. No external CMMS call is made.
      security:
      - bearerAuth: []
      x-permission-required: work_order.read
      x-audit-event-generated: none
      x-source-of-truth-boundary: AIM internal work order fallback only. No external CMMS write occurs.
      parameters:
      - in: path
        name: workOrderId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Internal work order detail
        '404':
          description: Internal work order not found
    patch:
      tags:
      - Work Orders
      summary: Update internal AIM work order fallback record
      description: Update internal work order status/assignment/action details. external_cmms_reference must remain null/omitted because external CMMS integration is out of scope.
      security:
      - bearerAuth: []
      x-permission-required: work_order.update
      x-audit-event-generated: INTERNAL_WORK_ORDER_UPDATED
      x-source-of-truth-boundary: AIM internal work order fallback only. No external CMMS write occurs.
      parameters:
      - in: path
        name: workOrderId
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalWorkOrderUpdateRequest'
      responses:
        '200':
          description: Internal work order updated
  /api/v1/work-orders/{workOrderId}/close:
    post:
      tags:
      - Work Orders
      summary: Close internal AIM work order with completion note and required closure evidence
      description: Close an internal work order. completion_note is required. If closure_evidence_required is true, closure_evidence_link_id or existing closure evidence must be present. The action is audit logged and remains internal AIM fallback only.
      security:
      - bearerAuth: []
      x-permission-required: work_order.close
      x-audit-event-generated: INTERNAL_WORK_ORDER_CLOSED or INTERNAL_WORK_ORDER_CLOSE_BLOCKED
      x-human-review-required: true
      x-evidence-link-required: conditional
      x-source-of-truth-boundary: AIM internal work order fallback only. No SAP/Maximo/CMMS close action is implemented.
      parameters:
      - in: path
        name: workOrderId
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalWorkOrderCloseRequest'
      responses:
        '200':
          description: Internal work order closed
        '409':
          $ref: '#/components/responses/GateBlocked'
  /api/v1/evidence/upload-url:
    post:
      summary: Create an audited signed evidence upload URL
      description: RC3-B object-storage flow. AIM validates metadata, generates the AIM evidence code and object key, records a pending upload session, and returns a short-lived signed PUT URL. `checksum_sha256` is mandatory for gate-eligible uploads. Evidence metadata is not finalized until complete-upload verifies object existence and checksum controls.
      x-permission-required: evidence.upload
      x-audit-event-generated: EVIDENCE_UPLOAD_URL_CREATED
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvidenceUploadUrlRequest'
      responses:
        '201':
          description: Signed upload URL issued
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '403':
          $ref: '#/components/responses/Forbidden'
      x-source-of-truth-boundary: PostgreSQL stores upload-session metadata; original evidence file is uploaded to private object storage.
      x-human-review-required: true
  /api/v1/evidence/complete-upload:
    post:
      summary: Complete evidence upload after object-storage verification
      description: Verifies that the uploaded object exists and matches declared metadata before finalizing evidence metadata in AIM.
      x-permission-required: evidence.upload
      x-audit-event-generated: EVIDENCE_UPLOAD_COMPLETED
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvidenceCompleteUploadRequest'
      responses:
        '201':
          description: Evidence metadata finalized after object verification
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Object missing, expired session, size mismatch, checksum mismatch, or checksum-required failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      x-source-of-truth-boundary: Metadata is finalized only after object-storage headObject succeeds and declared size/checksum rules pass.
  /api/v1/evidence/{evidenceId}/download:
    get:
      summary: Open evidence file through an audited signed object-storage redirect
      x-permission-required: evidence.open
      x-audit-event-generated: EVIDENCE_DOWNLOAD_OPENED
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: evidenceId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '302':
          description: Redirect to signed object-storage URL after RBAC, object-existence, malware-status, and audit checks
        '409':
          description: Evidence object missing, object key missing, or blocked by malware scan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      x-source-of-truth-boundary: Signed URL query secrets are never stored unredacted in audit logs; blocked access attempts are audit-logged as EVIDENCE_ACCESS_BLOCKED.
  /api/v1/reports/{reportId}/exports:
    get:
      summary: List object-storage report exports
      x-permission-required: report.read
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: reportId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Report export list
    post:
      summary: Create object-storage report export
      description: Stores generated report artifacts in private object storage and returns export metadata plus a short-lived signed download URL. Final PDF/DOCX exports require issued reports.
      x-permission-required: report.export
      x-audit-event-generated: REPORT_EXPORT_CREATED
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: reportId
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportExportCreateRequest'
      responses:
        '201':
          description: Report export object artifact created
        '409':
          description: Report export blocked by readiness/issue gates or missing generated artifact
      x-human-review-required: true
      x-source-of-truth-boundary: PostgreSQL stores report export metadata and hashes; object storage stores generated artifacts.
  /api/v1/report-exports/{exportId}/download-url:
    get:
      summary: Create signed report export download URL
      x-permission-required: report.export
      x-audit-event-generated: REPORT_EXPORT_DOWNLOAD_URL_CREATED
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: exportId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Signed report export URL issued after object existence check
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Report export object missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      x-source-of-truth-boundary: Signed URL query secrets are redacted from audit metadata.
components:
  securitySchemes:
    DemoRoleHeaders:
      type: apiKey
      in: header
      name: x-aim-demo-roles
      description: Local/test-only demo header fallback. Production API uses bearerAuth.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthenticated:
      description: Authentication context is required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Required permission is missing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ValidationFailed:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    GateBlocked:
      description: Governance gate blocked the operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Requested entity not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    EvidenceUploadUrlRequest:
      type: object
      required: [asset_id, filename, mime_type, size_bytes, checksum_sha256]
      properties:
        asset_id:
          type: string
          format: uuid
        inspection_id:
          type: string
          format: uuid
          nullable: true
        filename:
          type: string
        mime_type:
          type: string
        size_bytes:
          type: integer
        checksum_sha256:
          type: string
          pattern: '^[a-fA-F0-9]{64}$'
          description: Required SHA-256 checksum for gate-eligible object-storage evidence uploads.
    EvidenceCompleteUploadRequest:
      type: object
      required: [upload_session_id]
      properties:
        upload_session_id:
          type: string
          format: uuid
        checksum_sha256:
          type: string
          nullable: true
    ReportExportCreateRequest:
      type: object
      required: [export_type]
      properties:
        export_type:
          type: string
          enum: [pdf, docx, json, html]
    FfsCaseCreateRequest:
      type: object
      required:
      - asset_id
      - component
      - damage_mechanism
      - trigger_reason
      properties:
        asset_id:
          type: string
          format: uuid
        component:
          type: string
        damage_mechanism:
          type: string
          enum:
          - local_thin_area
          - crack_like_indication
          - dent_gouge
          - severe_corrosion
          - settlement_concern
          - out_of_roundness
          - brittle_fracture_concern
          - thickness_below_screening
          - engineering_review_required
        trigger_source:
          type: string
          default: manual_finding
        trigger_rule_id:
          type: string
        trigger_reason:
          type: string
        severity:
          type: string
          enum:
          - info
          - warning
          - blocking
          - critical
        evidence_links:
          type: array
          items:
            type: object
        supporting_measurements:
          type: array
          items:
            type: object
        assigned_engineer:
          type: string
          format: uuid
        due_date:
          type: string
          format: date
        required_next_action:
          type: string
    RbiCaseCreateRequest:
      type: object
      required:
      - asset_id
      additionalProperties: true
      properties:
        asset_id:
          type: string
          format: uuid
        inspection_event_id:
          type: string
          format: uuid
        calculation_run_id:
          type: string
          format: uuid
        system:
          type: string
        component:
          type: string
        damage_mechanism:
          type: string
        probability_driver:
          type: string
        consequence_driver:
          type: string
        risk_category:
          type: string
        recommended_interval:
          type: string
        inspection_plan_reference:
          type: string
        evidence_links:
          type: array
          items:
            type: object
        input_placeholders:
          type: object
          properties:
            consequence_of_failure:
              type: string
            probability_of_failure:
              type: string
            damage_mechanism:
              type: string
            inspection_effectiveness:
              type: string
            fluid_service:
              type: string
            inventory:
              type: string
            operating_severity:
              type: string
            mitigation_controls:
              type: string
    EngineeringReviewCreateRequest:
      type: object
      required:
      - entity_type
      - entity_id
      properties:
        entity_type:
          type: string
          enum:
          - asset
          - calculation_run
          - ndt_measurement
          - ffs_case
          - rbi_case
          - finding
        entity_id:
          type: string
          format: uuid
        review_type:
          type: string
        review_status:
          type: string
          enum:
          - draft
          - submitted_for_review
          - returned_for_revision
          - reviewed
          - submitted_for_approval
          - approved
          - rejected
          - locked
        checklist:
          type: object
        review_comment:
          type: string
    ApprovalRecordCreateRequest:
      type: object
      required:
      - entity_type
      - entity_id
      properties:
        review_id:
          type: string
          format: uuid
        entity_type:
          type: string
        entity_id:
          type: string
          format: uuid
        calculation_run_id:
          type: string
          format: uuid
        approval_type:
          type: string
          enum:
          - final_result
          - override
        checklist:
          type: object
        approval_comment:
          type: string
    ReportGenerateRequest:
      type: object
      required:
      - calculation_run_id
      properties:
        calculation_run_id:
          type: string
          format: uuid
        report_title:
          type: string
        output_formats:
          type: array
          items:
            type: string
            enum:
            - docx
            - pdf
      description: Generates a draft report only. Draft remains not approved until report.approve workflow is completed.
    GeneratedReport:
      type: object
      properties:
        report_id:
          type: string
          format: uuid
        report_code:
          type: string
        report_status:
          type: string
          enum:
          - draft
          - generated
          - under_review
          - approved
          - issued
          - superseded
          - rejected
        report_version:
          type: integer
        calculation_run_id:
          type: string
          format: uuid
        input_snapshot_hash:
          type: string
        traceability:
          type: object
        docx_object_path:
          type: string
        pdf_object_path:
          type: string
    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          required:
          - code
          - message
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
                additionalProperties: true
            requestId:
              type: string
              nullable: true
    FormulaRegistryPayload:
      type: object
      required:
      - formula_id
      - formula_name
      - code_basis
      - code_edition
      - clause_reference
      - formula_type
      - expression_type
      - formula_expression_source
      - input_schema
      - output_schema
      - unit_rules
      - validation_rules
      properties:
        formula_id:
          type: string
        formula_name:
          type: string
        code_basis:
          type: string
        code_edition:
          type: string
        clause_reference:
          type: string
          description: Manual licensed reference only. Do not reproduce copyrighted clause text.
        component:
          type: string
        damage_mechanism:
          type: string
        formula_type:
          type: string
          enum:
          - universal_deterministic
          - api_controlled
          - rbi_rule
          - ffs_trigger
          - report_phrase_rule
        expression_type:
          type: string
          enum:
          - none
          - controlled_placeholder
          - engineer_entered
          - json_logic
          - text_rule
        expression_body:
          type: string
          description: Controlled placeholder unless entered by an authorized engineer from licensed sources or approved fixtures.
        formula_expression_source:
          type: string
          description: Required source traceability label, e.g. controlled_placeholder_manual_entry or licensed_engineer_entry reference.
        input_schema:
          type: object
        output_schema:
          type: object
        unit_rules:
          type: object
