openapi: 3.0.3
info:
  title: AIM Tank Integrity API
  version: 0.16.0
  description: Current implemented AIM+n8n Tank Integrity OpenAPI contract through RC3-B evidence/report object-storage hardening. AIM is the system of
    record; PostgreSQL stores final structured engineering data; object storage stores original evidence. n8n remains orchestration-only and must
    call AIM backend APIs only. AI extraction output is staging-only and requires human engineering review before promotion. This contract documents
    implemented auth, AI extraction/staging, evidence governance, approval, and report issue gates; it does not implement API 579/API 581, CMMS,
    3D processing, or invented API/API-ASME formulas.
servers:
- url: http://localhost:4000
  description: Local/development API root; implemented paths include /api/v1.
security:
- bearerAuth: []
x-internal-routes-excluded:
  note: Health routes are runtime readiness endpoints. RBAC demo routes are intentionally excluded from the production OpenAPI contract; they are mounted only in local/development/test when AUTH_ALLOW_LOCAL_DEMO=true and are not engineering workflow APIs.
  routes:
  - /health
  - /health/db
  - /api/v1/rbac/demo/asset-read
  - /api/v1/rbac/demo/calculation-approve
paths:
  /api/v1/assets:
    get:
      summary: List tank assets
      x-permission-required: asset.read
      responses:
        '200':
          description: Asset list
      security:
      - bearerAuth: []
      x-audit-event-generated: none
    post:
      summary: Create tank asset
      x-permission-required: asset.create
      x-audit-event-generated: ASSET_CREATED
      responses:
        '201':
          description: Asset created
      security:
      - bearerAuth: []
  /api/v1/assets/{assetId}:
    get:
      summary: Get tank asset detail with geometry and shell courses
      x-permission-required: asset.read
      parameters:
      - in: path
        name: assetId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Asset detail
      security:
      - bearerAuth: []
      x-audit-event-generated: none
    patch:
      summary: Update tank asset
      x-permission-required: asset.update
      x-audit-event-generated: ASSET_UPDATED
      parameters:
      - in: path
        name: assetId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Asset updated
      security:
      - bearerAuth: []
    delete:
      summary: Soft delete tank asset
      x-permission-required: asset.delete
      x-audit-event-generated: ASSET_DELETED
      parameters:
      - in: path
        name: assetId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Asset retired/deleted
      security:
      - bearerAuth: []
  /api/v1/assets/{assetId}/geometry:
    get:
      summary: Get tank geometry for an asset
      x-permission-required: asset.read
      parameters:
      - in: path
        name: assetId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Geometry detail
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
      - bearerAuth: []
      x-audit-event-generated: none
    put:
      summary: Upsert tank geometry
      x-permission-required: asset.update
      x-audit-event-generated: TANK_GEOMETRY_CREATED or TANK_GEOMETRY_UPDATED
      parameters:
      - in: path
        name: assetId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Geometry upserted
      security:
      - bearerAuth: []
  /api/v1/assets/{assetId}/shell-courses:
    get:
      summary: List shell courses for an asset
      x-permission-required: asset.read
      parameters:
      - in: path
        name: assetId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Shell course list
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
      - bearerAuth: []
      x-audit-event-generated: none
    post:
      summary: Create shell course
      x-permission-required: asset.update
      x-audit-event-generated: SHELL_COURSE_CREATED
      parameters:
      - in: path
        name: assetId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '201':
          description: Shell course created
      security:
      - bearerAuth: []
  /api/v1/assets/{assetId}/shell-courses/{courseId}:
    patch:
      summary: Update shell course
      x-permission-required: asset.update
      x-audit-event-generated: SHELL_COURSE_UPDATED
      parameters:
      - in: path
        name: assetId
        required: true
        schema:
          type: string
          format: uuid
      - in: path
        name: courseId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Shell course updated
      security:
      - bearerAuth: []
    delete:
      summary: Delete shell course
      x-permission-required: asset.update
      x-audit-event-generated: SHELL_COURSE_DELETED
      parameters:
      - in: path
        name: assetId
        required: true
        schema:
          type: string
          format: uuid
      - in: path
        name: courseId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Shell course deleted
      security:
      - bearerAuth: []
  /api/v1/materials:
    get:
      summary: List material master options
      x-permission-required: asset.read
      responses:
        '200':
          description: Material list
      security:
      - bearerAuth: []
      x-audit-event-generated: none
  /api/v1/evidence:
    get:
      summary: List evidence files
      x-permission-required: evidence.read
      responses:
        '200':
          description: Evidence list
      security:
      - bearerAuth: []
      x-audit-event-generated: none
      x-source-of-truth-boundary: AIM is the system of record. AIM backend API only; PostgreSQL mutations occur only through AIM services.
  /api/v1/evidence/upload:
    post:
      summary: Legacy evidence metadata import only; not gate-eligible until object storage is verified
      description: Deprecated RC2 metadata-only route retained for compatibility. It registers metadata as metadata_only_pending_object_verification and upload_status=pending. Use /api/v1/evidence/upload-url followed by /api/v1/evidence/complete-upload for gate-eligible RC3-B object-storage evidence.
      x-permission-required: evidence.upload
      x-audit-event-generated: EVIDENCE_LEGACY_METADATA_REGISTERED
      responses:
        '201':
          description: Legacy metadata registered but not object-storage verified
        '409':
          $ref: '#/components/responses/GateBlocked'
      security:
      - bearerAuth: []
      x-source-of-truth-boundary: AIM is the system of record. AIM backend API only; PostgreSQL mutations occur only through AIM services.
  /api/v1/evidence/{evidenceId}:
    get:
      summary: Get evidence metadata
      x-permission-required: evidence.read
      parameters:
      - in: path
        name: evidenceId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Evidence detail
      security:
      - bearerAuth: []
      x-audit-event-generated: none
      x-source-of-truth-boundary: AIM is the system of record. AIM backend API only; PostgreSQL mutations occur only through AIM services.
  /api/v1/evidence/{evidenceId}/open:
    get:
      summary: Open object storage evidence link
      x-permission-required: evidence.open
      parameters:
      - in: path
        name: evidenceId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Evidence open metadata
      security:
      - bearerAuth: []
      x-audit-event-generated: EVIDENCE_DOWNLOAD_URL_CREATED
      x-source-of-truth-boundary: AIM is the system of record. AIM backend API only; PostgreSQL mutations occur only through AIM services.
  /api/v1/evidence/{evidenceId}/links:
    post:
      summary: Link evidence to asset, inspection, NDT, calculation, finding, FFS, or RBI entity
      x-permission-required: evidence.link
      x-audit-event-generated: EVIDENCE_LINKED
      parameters:
      - in: path
        name: evidenceId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '201':
          description: Evidence link created
      security:
      - bearerAuth: []
      x-source-of-truth-boundary: AIM is the system of record. AIM backend API only; PostgreSQL mutations occur only through AIM services.
  /api/v1/ndt/measurements:
    get:
      summary: List NDT measurements
      x-permission-required: ndt.read
      responses:
        '200':
          description: NDT measurement list
      security:
      - bearerAuth: []
      x-audit-event-generated: none
    post:
      summary: Create NDT measurement
      x-permission-required: ndt.create
      x-audit-event-generated: NDT_MEASUREMENT_CREATED
      responses:
        '201':
          description: NDT measurement created
      security:
      - bearerAuth: []
  /api/v1/ndt/measurements/bulk-import:
    post:
      summary: Bulk import NDT measurements
      x-permission-required: ndt.import
      x-audit-event-generated: NDT_MEASUREMENT_BULK_IMPORTED
      responses:
        '201':
          description: NDT measurements imported
      security:
      - bearerAuth: []
  /api/v1/ndt/measurements/{measurementId}:
    get:
      summary: Get NDT measurement detail
      x-permission-required: ndt.read
      parameters:
      - in: path
        name: measurementId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: NDT measurement detail
      security:
      - bearerAuth: []
      x-audit-event-generated: none
  /api/v1/ndt/measurements/{measurementId}/review:
    post:
      summary: Review NDT measurement without approval
      x-permission-required: ndt.review
      x-audit-event-generated: NDT_MEASUREMENT_REVIEWED
      parameters:
      - in: path
        name: measurementId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: NDT measurement reviewed
      security:
      - bearerAuth: []
      x-human-review-required: true
  /api/v1/ndt/measurements/{measurementId}/approve:
    post:
      summary: Approve NDT measurement after evidence gate
      x-permission-required: ndt.approve
      x-audit-event-generated: NDT_MEASUREMENT_APPROVED
      parameters:
      - in: path
        name: measurementId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: NDT measurement approved
      security:
      - bearerAuth: []
      x-human-review-required: true
  /api/v1/engineering/data-dictionary:
    get:
      summary: List active engineering data dictionary fields
      x-permission-required: validation.read
      responses:
        '200':
          description: Engineering data dictionary
      security:
      - bearerAuth: []
      x-audit-event-generated: none
  /api/v1/engineering/validate-input:
    post:
      summary: Run deterministic engineering validation and persist validation run snapshot
      x-permission-required: validation.run
      x-audit-event-generated: ENGINEERING_VALIDATION_RUN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EngineeringValidationRequest'
      responses:
        '201':
          description: Validation result snapshot
      security:
      - bearerAuth: []
  /api/v1/workflow-events:
    post:
      summary: Receive n8n workflow event through AIM API
      x-permission-required: workflow_event.create
      responses:
        '201':
          description: Workflow event recorded
      security:
      - bearerAuth: []
      x-audit-event-generated: unspecified
  /api/v1/error-logs:
    get:
      summary: List error logs
      x-permission-required: error_log.read
      responses:
        '200':
          description: Error log list
      security:
      - bearerAuth: []
      x-audit-event-generated: none
    post:
      summary: Create error log through AIM API
      x-permission-required: error_log.create
      responses:
        '201':
          description: Error log recorded
      security:
      - bearerAuth: []
      x-audit-event-generated: unspecified
  /api/v1/formulas:
    get:
      summary: List Formula Registry versions
      x-permission-required: formula.read
      responses:
        '200':
          description: Formula list
      security:
      - bearerAuth: []
      x-audit-event-generated: none
    post:
      summary: Create Formula Registry draft
      x-permission-required: formula.create
      x-role-restriction: admin or senior_engineer
      x-audit-event-generated: FORMULA_CREATED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormulaRegistryPayload'
      responses:
        '201':
          description: Formula created
        '400':
          $ref: '#/components/responses/ValidationError'
      security:
      - bearerAuth: []
  /api/v1/formulas/approved/{formulaId}:
    get:
      summary: Query production-usable approved/locked formula by formula_id and optional version
      x-permission-required: formula.read
      parameters:
      - in: path
        name: formulaId
        required: true
        schema:
          type: string
      - in: query
        name: version
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Approved formula metadata
        '404':
          description: Approved formula not found
      security:
      - bearerAuth: []
      x-audit-event-generated: required
      x-human-review-required: true
  /api/v1/formulas/{formulaId}/versions:
    get:
      summary: List versions for a formula_id
      x-permission-required: formula.read
      parameters:
      - in: path
        name: formulaId
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Formula version list
      security:
      - bearerAuth: []
      x-audit-event-generated: none
  /api/v1/formulas/{formulaId}/compare:
    get:
      summary: Compare two formula versions
      x-permission-required: formula.read
      parameters:
      - in: path
        name: formulaId
        required: true
        schema:
          type: string
      - in: query
        name: from_version
        required: true
        schema:
          type: string
      - in: query
        name: to_version
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Formula comparison
      security:
      - bearerAuth: []
      x-audit-event-generated: none
  /api/v1/formulas/records/{recordId}:
    get:
      summary: Get Formula Registry record detail
      x-permission-required: formula.read
      responses:
        '200':
          description: Formula detail
      security:
      - bearerAuth: []
      x-audit-event-generated: none
    patch:
      summary: Update draft formula or create new draft version when editing approved/locked formula
      x-permission-required: formula.update
      x-role-restriction: admin or senior_engineer
      x-audit-event-generated: FORMULA_UPDATED or FORMULA_VERSION_CREATED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormulaRegistryPayload'
      responses:
        '200':
          description: Formula updated or new version created
        '400':
          $ref: '#/components/responses/ValidationError'
      security:
      - bearerAuth: []
  /api/v1/formulas/records/{recordId}/approve:
    post:
      summary: Approve and lock a Formula Registry version
      x-permission-required: formula.approve
      x-role-restriction: admin or senior_engineer
      x-audit-event-generated: FORMULA_APPROVED
      responses:
        '200':
          description: Formula approved
      security:
      - bearerAuth: []
      x-human-review-required: true
  /api/v1/formulas/records/{recordId}/deprecate:
    post:
      summary: Deprecate a Formula Registry version
      x-permission-required: formula.retire
      x-role-restriction: admin or senior_engineer
      x-audit-event-generated: FORMULA_DEPRECATED
      responses:
        '200':
          description: Formula deprecated
      security:
      - bearerAuth: []
  /api/v1/formulas/records/{recordId}/test-run:
    post:
      summary: Run placeholder formula test-case check without executing engineering formula
      x-permission-required: formula.test
      x-role-restriction: admin or senior_engineer
      x-audit-event-generated: FORMULA_TEST_PLACEHOLDER_RUN
      responses:
        '201':
          description: Placeholder test run recorded
      security:
      - bearerAuth: []
  /api/v1/engineering/calculate:
    post:
      summary: Run deterministic engineering calculation
      description: >-
        Runs universal deterministic calculations only with an explicit approved formula version. Silent/default formula selection is blocked. API/API-ASME-dependent calculations must use approved Formula Registry metadata and are not hard-coded. Calculation outputs preserve input/output snapshots, warnings, evidence gates, and the disclaimer: Engineering review required before final use.
      x-permission-required: calculation.run
      x-audit-event-generated: calculation.run_requested|calculation.completed|calculation.failed|calculation.warning_raised|calculation.final_use_blocked
      x-source-of-truth-boundary: AIM is the system of record. Calculation runs are persisted only by AIM backend services with versioned formula snapshots and audit logs.
      x-human-review-required: true
      x-evidence-link-required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EngineeringCalculationRequest'
      responses:
        '201':
          description: Calculation completed and stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineeringCalculationResponse'
        '422':
          description: Calculation blocked by validation and run snapshot stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineeringCalculationResponse'
        '400':
          description: Invalid request, approved Formula Registry record missing, or non-universal deterministic formula blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - bearerAuth: []
  /api/v1/engineering/calculations:
    get:
      summary: List calculation runs
      x-permission-required: calculation.read
      parameters:
      - in: query
        name: asset_id
        required: false
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Calculation run list
      security:
      - bearerAuth: []
      x-audit-event-generated: none
      x-source-of-truth-boundary: AIM is the system of record. AIM backend API only; PostgreSQL mutations occur only through AIM services.
  /api/v1/ffs/cases:
    get:
      summary: List FFS trigger cases
      description: Lists API 579-1/ASME FFS-1 governance trigger cases. Cases do not declare fitness for service.
      x-permission-required: ffs.read
      parameters:
      - in: query
        name: asset_id
        required: false
        schema:
          type: string
          format: uuid
      - in: query
        name: status
        required: false
        schema:
          type: string
          enum:
          - open
          - under_review
          - data_required
          - assessment_in_progress
          - accepted
          - repair_required
          - monitor
          - closed
      responses:
        '200':
          description: FFS case list
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
      - bearerAuth: []
      x-audit-event-generated: none
    post:
      summary: Manually create an FFS trigger case
      description: Creates an engineer-review case from a finding or manual trigger. This endpoint never declares fitness for service.
      x-permission-required: ffs.create
      x-audit-event-generated: FFS_CASE_CREATED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FfsCaseCreateRequest'
      responses:
        '201':
          description: FFS case created
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
      - bearerAuth: []
  /api/v1/ffs/cases/from-calculation:
    post:
      summary: Create FFS cases from calculation warnings
      description: Creates FFS trigger cases from deterministic calculation warning outputs. Trigger only; no fitness declaration.
      x-permission-required: ffs.trigger
      x-calculation-run-lookup: uuid-or-run-id
      x-audit-event-generated: FFS_CASES_TRIGGERED_FROM_CALCULATION
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - calculation_run_id
              properties:
                calculation_run_id:
                  type: string
                assigned_engineer:
                  type: string
                  format: uuid
                due_date:
                  type: string
                  format: date
      responses:
        '201':
          description: FFS cases created from calculation warning outputs
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
      - bearerAuth: []
      x-source-of-truth-boundary: AIM is the system of record. AIM backend API only; PostgreSQL mutations occur only through AIM services.
  /api/v1/ffs/cases/{caseId}:
    get:
      summary: Get FFS case detail
      x-permission-required: ffs.read
      parameters:
      - in: path
        name: caseId
        required: true
        schema:
          type: string
      responses:
        '200':
          description: FFS case detail
        '404':
          description: FFS case not found
      security:
      - bearerAuth: []
      x-audit-event-generated: none
  /api/v1/ffs/cases/{caseId}/status:
    patch:
      summary: Update FFS workflow status
      description: Updates non-final FFS workflow status. Use close endpoint for final disposition.
      x-permission-required: ffs.update
      x-audit-event-generated: FFS_CASE_STATUS_UPDATED
      parameters:
      - in: path
        name: caseId
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              properties:
                status:
                  type: string
                  enum:
                  - open
                  - under_review
                  - data_required
                  - assessment_in_progress
                  - accepted
                  - repair_required
                  - monitor
                assigned_engineer:
                  type: string
                  format: uuid
                due_date:
                  type: string
                  format: date
      responses:
        '200':
          description: FFS case status updated
        '400':
          $ref: '#/components/responses/ValidationError'
      security:
      - bearerAuth: []
  /api/v1/ffs/cases/{caseId}/close:
    post:
      summary: Approve final FFS disposition and close case
      description: Requires senior_engineer/admin authority. AI agents cannot close FFS cases. Does not perform FFS calculation.
      x-permission-required: ffs.approve
      x-audit-event-generated: FFS_CASE_FINAL_DISPOSITION_APPROVED
      parameters:
      - in: path
        name: caseId
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - final_disposition
              properties:
                final_disposition:
                  type: string
                approval_comment:
                  type: string
      responses:
        '200':
          description: Final FFS disposition approved and case closed
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
      - bearerAuth: []
  /api/v1/rbi/cases:
    get:
      summary: List RBI interface cases
      description: Lists API RP 580/581 governance interface cases. Quantitative API RP 581 rules are not implemented unless supplied through
        Formula Registry.
      x-permission-required: rbi.interface.read
      parameters:
      - in: query
        name: asset_id
        required: false
        schema:
          type: string
          format: uuid
      - in: query
        name: status
        required: false
        schema:
          type: string
          enum:
          - open
          - under_review
          - data_required
          - assessment_in_progress
          - ready_for_review
          - approved
          - exported
          - closed
      responses:
        '200':
          description: RBI case list
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
      - bearerAuth: []
      x-audit-event-generated: none
    post:
      summary: Manually create an RBI interface case
