openapi: 3.0.3
info:
  title: AIM Tank Integrity API
  version: 0.8.5
  description: Current implemented AIM+n8n Tank Integrity endpoints through Sprint 8.5 evidence linkage/security boundary hardening. Deterministic universal calculation engine, FFS trigger workflow, and RBI interface workflow governance are implemented; no API/API-ASME formula expressions are hard-coded or proprietary quantitative API RP 581 rules embedded.
servers:
  - url: http://localhost:4000/api/v1
security:
  - DemoRoleHeaders: []
x-internal-routes-excluded:
  note: Health and RBAC demo routes are intentionally excluded from the production OpenAPI contract. They are local-dev/internal readiness endpoints, not engineering workflow APIs.
  routes:
    - /health
    - /health/db
    - /api/v1/rbac/demo/asset-read
    - /api/v1/rbac/demo/calculation-approve
paths:
  /assets:
    get:
      summary: List tank assets
      x-permission-required: asset.read
      responses:
        '200': { description: Asset list }
    post:
      summary: Create tank asset
      x-permission-required: asset.create
      x-audit-event-generated: ASSET_CREATED
      responses:
        '201': { description: Asset created }
  /assets/{assetId}:
    get:
      summary: Get tank asset detail with geometry and shell courses
      x-permission-required: asset.read
      parameters:
        - in: path
          name: assetId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Asset detail }
    patch:
      summary: Update tank asset
      x-permission-required: asset.update
      x-audit-event-generated: ASSET_UPDATED
      parameters:
        - in: path
          name: assetId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Asset updated }
    delete:
      summary: Soft delete tank asset
      x-permission-required: asset.delete
      x-audit-event-generated: ASSET_DELETED
      parameters:
        - in: path
          name: assetId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Asset retired/deleted }
  /assets/{assetId}/geometry:
    get:
      summary: Get tank geometry for an asset
      x-permission-required: asset.read
      parameters:
        - in: path
          name: assetId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Geometry detail }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
    put:
      summary: Upsert tank geometry
      x-permission-required: asset.update
      x-audit-event-generated: TANK_GEOMETRY_CREATED or TANK_GEOMETRY_UPDATED
      parameters:
        - in: path
          name: assetId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Geometry upserted }
  /assets/{assetId}/shell-courses:
    get:
      summary: List shell courses for an asset
      x-permission-required: asset.read
      parameters:
        - in: path
          name: assetId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Shell course list }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      summary: Create shell course
      x-permission-required: asset.update
      x-audit-event-generated: SHELL_COURSE_CREATED
      parameters:
        - in: path
          name: assetId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '201': { description: Shell course created }
  /assets/{assetId}/shell-courses/{courseId}:
    patch:
      summary: Update shell course
      x-permission-required: asset.update
      x-audit-event-generated: SHELL_COURSE_UPDATED
      parameters:
        - in: path
          name: assetId
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: courseId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Shell course updated }
    delete:
      summary: Delete shell course
      x-permission-required: asset.update
      x-audit-event-generated: SHELL_COURSE_DELETED
      parameters:
        - in: path
          name: assetId
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: courseId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Shell course deleted }
  /materials:
    get:
      summary: List material master options
      x-permission-required: asset.read
      responses:
        '200': { description: Material list }
  /evidence:
    get:
      summary: List evidence files
      x-permission-required: evidence.read
      responses:
        '200': { description: Evidence list }
  /evidence/upload:
    post:
      summary: Register evidence metadata and object storage path
      x-permission-required: evidence.upload
      x-audit-event-generated: EVIDENCE_UPLOADED
      responses:
        '201': { description: Evidence registered }
  /evidence/{evidenceId}:
    get:
      summary: Get evidence metadata
      x-permission-required: evidence.read
      parameters:
        - in: path
          name: evidenceId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Evidence detail }
  /evidence/{evidenceId}/open:
    get:
      summary: Open object storage evidence link
      x-permission-required: evidence.open
      parameters:
        - in: path
          name: evidenceId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Evidence open metadata }
  /evidence/{evidenceId}/links:
    post:
      summary: Link evidence to asset, inspection, NDT, calculation, finding, FFS, or RBI entity
      x-permission-required: evidence.link
      x-audit-event-generated: EVIDENCE_LINKED
      parameters:
        - in: path
          name: evidenceId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '201': { description: Evidence link created }
  /ndt/measurements:
    get:
      summary: List NDT measurements
      x-permission-required: ndt.read
      responses:
        '200': { description: NDT measurement list }
    post:
      summary: Create NDT measurement
      x-permission-required: ndt.create
      x-audit-event-generated: NDT_MEASUREMENT_CREATED
      responses:
        '201': { description: NDT measurement created }
  /ndt/measurements/bulk-import:
    post:
      summary: Bulk import NDT measurements
      x-permission-required: ndt.import
      x-audit-event-generated: NDT_MEASUREMENT_BULK_IMPORTED
      responses:
        '201': { description: NDT measurements imported }
  /ndt/measurements/{measurementId}:
    get:
      summary: Get NDT measurement detail
      x-permission-required: ndt.read
      parameters:
        - in: path
          name: measurementId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: NDT measurement detail }
  /ndt/measurements/{measurementId}/review:
    post:
      summary: Review NDT measurement without approval
      x-permission-required: ndt.review
      x-audit-event-generated: NDT_MEASUREMENT_REVIEWED
      parameters:
        - in: path
          name: measurementId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: NDT measurement reviewed }
  /ndt/measurements/{measurementId}/approve:
    post:
      summary: Approve NDT measurement after evidence gate
      x-permission-required: ndt.approve
      x-audit-event-generated: NDT_MEASUREMENT_APPROVED
      parameters:
        - in: path
          name: measurementId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: NDT measurement approved }
  /engineering/data-dictionary:
    get:
      summary: List active engineering data dictionary fields
      x-permission-required: validation.read
      responses:
        '200': { description: Engineering data dictionary }
  /engineering/validate-input:
    post:
      summary: Run deterministic engineering validation and persist validation run snapshot
      x-permission-required: validation.run
      x-audit-event-generated: ENGINEERING_VALIDATION_RUN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EngineeringValidationRequest'
      responses:
        '201': { description: Validation result snapshot }
  /workflow-events:
    post:
      summary: Receive n8n workflow event through AIM API
      x-permission-required: workflow_event.create
      responses:
        '201': { description: Workflow event recorded }
  /error-logs:
    get:
      summary: List error logs
      x-permission-required: error_log.read
      responses:
        '200': { description: Error log list }
    post:
      summary: Create error log through AIM API
      x-permission-required: error_log.create
      responses:
        '201': { description: Error log recorded }
  /formulas:
    get:
      summary: List Formula Registry versions
      x-permission-required: formula.read
      responses:
        '200': { description: Formula list }
    post:
      summary: Create Formula Registry draft
      x-permission-required: formula.create
      x-role-restriction: admin or senior_engineer
      x-audit-event-generated: FORMULA_CREATED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormulaRegistryPayload'
      responses:
        '201': { description: Formula created }
        '400': { $ref: '#/components/responses/ValidationError' }
  /formulas/approved/{formulaId}:
    get:
      summary: Query production-usable approved/locked formula by formula_id and optional version
      x-permission-required: formula.read
      parameters:
        - in: path
          name: formulaId
          required: true
          schema: { type: string }
        - in: query
          name: version
          required: false
          schema: { type: string }
      responses:
        '200': { description: Approved formula metadata }
        '404': { description: Approved formula not found }
  /formulas/{formulaId}/versions:
    get:
      summary: List versions for a formula_id
      x-permission-required: formula.read
      parameters:
        - in: path
          name: formulaId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Formula version list }
  /formulas/{formulaId}/compare:
    get:
      summary: Compare two formula versions
      x-permission-required: formula.read
      parameters:
        - in: path
          name: formulaId
          required: true
          schema: { type: string }
        - in: query
          name: from_version
          required: true
          schema: { type: string }
        - in: query
          name: to_version
          required: true
          schema: { type: string }
      responses:
        '200': { description: Formula comparison }
  /formulas/records/{recordId}:
    get:
      summary: Get Formula Registry record detail
      x-permission-required: formula.read
      responses:
        '200': { description: Formula detail }
    patch:
      summary: Update draft formula or create new draft version when editing approved/locked formula
      x-permission-required: formula.update
      x-role-restriction: admin or senior_engineer
      x-audit-event-generated: FORMULA_UPDATED or FORMULA_VERSION_CREATED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormulaRegistryPayload'
      responses:
        '200': { description: Formula updated or new version created }
        '400': { $ref: '#/components/responses/ValidationError' }
  /formulas/records/{recordId}/approve:
    post:
      summary: Approve and lock a Formula Registry version
      x-permission-required: formula.approve
      x-role-restriction: admin or senior_engineer
      x-audit-event-generated: FORMULA_APPROVED
      responses:
        '200': { description: Formula approved }
  /formulas/records/{recordId}/deprecate:
    post:
      summary: Deprecate a Formula Registry version
      x-permission-required: formula.retire
      x-role-restriction: admin or senior_engineer
      x-audit-event-generated: FORMULA_DEPRECATED
      responses:
        '200': { description: Formula deprecated }
  /formulas/records/{recordId}/test-run:
    post:
      summary: Run placeholder formula test-case check without executing engineering formula
      x-permission-required: formula.test
      x-role-restriction: admin or senior_engineer
      x-audit-event-generated: FORMULA_TEST_PLACEHOLDER_RUN
      responses:
        '201': { description: Placeholder test run recorded }
  /engineering/calculate:
    post:
      summary: Run deterministic engineering calculation
      description: Runs universal deterministic calculations only. API/API-ASME-dependent calculations must use approved Formula Registry metadata and are not hard-coded. Calculation blocks when validation severity is blocking.
      x-permission-required: calculation.run
      x-audit-event-generated: CALCULATION_RUN_CREATED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EngineeringCalculationRequest'
      responses:
        '201':
          description: Calculation completed and stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineeringCalculationResponse'
        '422':
          description: Calculation blocked by validation and run snapshot stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngineeringCalculationResponse'
        '400':
          description: Invalid request, approved Formula Registry record missing, or non-universal deterministic formula blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /engineering/calculations:
    get:
      summary: List calculation runs
      x-permission-required: calculation.read
      parameters:
        - in: query
          name: asset_id
          required: false
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Calculation run list }

  /ffs/cases:
    get:
      summary: List FFS trigger cases
      description: Lists API 579-1/ASME FFS-1 governance trigger cases. Cases do not declare fitness for service.
      x-permission-required: ffs.read
      parameters:
        - in: query
          name: asset_id
          required: false
          schema: { type: string, format: uuid }
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [open, under_review, data_required, assessment_in_progress, accepted, repair_required, monitor, closed]
      responses:
        '200': { description: FFS case list }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      summary: Manually create an FFS trigger case
      description: Creates an engineer-review case from a finding or manual trigger. This endpoint never declares fitness for service.
      x-permission-required: ffs.create
      x-audit-event-generated: FFS_CASE_CREATED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FfsCaseCreateRequest'
      responses:
        '201': { description: FFS case created }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /ffs/cases/from-calculation:
    post:
      summary: Create FFS cases from calculation warnings
      description: Creates FFS trigger cases from deterministic calculation warning outputs. Trigger only; no fitness declaration.
      x-permission-required: ffs.trigger
      x-audit-event-generated: FFS_CASES_TRIGGERED_FROM_CALCULATION
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [calculation_run_id]
              properties:
                calculation_run_id: { type: string }
                assigned_engineer: { type: string, format: uuid }
                due_date: { type: string, format: date }
      responses:
        '201': { description: FFS cases created from calculation warning outputs }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /ffs/cases/{caseId}:
    get:
      summary: Get FFS case detail
      x-permission-required: ffs.read
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
      responses:
        '200': { description: FFS case detail }
        '404': { description: FFS case not found }
  /ffs/cases/{caseId}/status:
    patch:
      summary: Update FFS workflow status
      description: Updates non-final FFS workflow status. Use close endpoint for final disposition.
      x-permission-required: ffs.update
      x-audit-event-generated: FFS_CASE_STATUS_UPDATED
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [open, under_review, data_required, assessment_in_progress, accepted, repair_required, monitor]
                assigned_engineer: { type: string, format: uuid }
                due_date: { type: string, format: date }
      responses:
        '200': { description: FFS case status updated }
        '400': { $ref: '#/components/responses/ValidationError' }
  /ffs/cases/{caseId}/close:
    post:
      summary: Approve final FFS disposition and close case
      description: Requires senior_engineer/admin authority. AI agents cannot close FFS cases. Does not perform FFS calculation.
      x-permission-required: ffs.approve
      x-audit-event-generated: FFS_CASE_FINAL_DISPOSITION_APPROVED
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [final_disposition]
              properties:
                final_disposition: { type: string }
                approval_comment: { type: string }
      responses:
        '200': { description: Final FFS disposition approved and case closed }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /rbi/cases:
    get:
      summary: List RBI interface cases
      description: Lists API RP 580/581 governance interface cases. Quantitative API RP 581 rules are not implemented unless supplied through Formula Registry.
      x-permission-required: rbi.interface.read
      parameters:
        - in: query
          name: asset_id
          required: false
          schema: { type: string, format: uuid }
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [open, under_review, data_required, assessment_in_progress, ready_for_review, approved, exported, closed]
      responses:
        '200': { description: RBI case list }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      summary: Manually create an RBI interface case
      description: Creates a qualitative/semi-quantitative placeholder RBI interface case from engineering review. Does not implement proprietary API RP 581 quantitative rules.
      x-permission-required: rbi.interface.create
      x-audit-event-generated: RBI_CASE_CREATED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RbiCaseCreateRequest'
      responses:
        '201': { description: RBI case created }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /rbi/cases/from-calculation:
    post:
      summary: Create RBI case from calculation warnings
      description: Creates an RBI interface case from deterministic calculation warnings such as high corrosion rate, short remaining life, repeated anomaly, or engineering review. Trigger only; no quantitative API RP 581 calculation.
      x-permission-required: rbi.interface.create
      x-audit-event-generated: RBI_CASE_CREATED_FROM_CALCULATION
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [calculation_run_id]
              properties:
                calculation_run_id: { type: string }
                system: { type: string }
                component: { type: string }
                damage_mechanism: { type: string }
      responses:
        '201': { description: RBI case created from calculation warning outputs }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /rbi/cases/{caseId}:
    get:
      summary: Get RBI case detail
      x-permission-required: rbi.interface.read
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
      responses:
        '200': { description: RBI case detail }
        '404': { description: RBI case not found }
  /rbi/cases/{caseId}/status:
    patch:
      summary: Update RBI workflow status
      description: Updates non-final RBI interface workflow status. Use approval endpoint for approved/exported/closed states.
      x-permission-required: rbi.interface.update
      x-audit-event-generated: RBI_CASE_STATUS_UPDATED
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [open, under_review, data_required, assessment_in_progress, ready_for_review]
      responses:
        '200': { description: RBI case status updated }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /rbi/cases/{caseId}/approve:
    post:
      summary: Approve RBI interface summary for export or inspection planning
      description: Requires senior_engineer/admin authority. AI agents cannot approve, export, close, or finalize RBI cases.
      x-permission-required: rbi.interface.approve
      x-audit-event-generated: RBI_CASE_APPROVED
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [approved, exported, closed]
      responses:
        '200': { description: RBI case approved }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  securitySchemes:
    DemoRoleHeaders:
      type: apiKey
      in: header
      name: x-aim-demo-roles
  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthenticated:
      description: Authentication context is required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Required permission is missing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:

    FfsCaseCreateRequest:
      type: object
      required: [asset_id, component, damage_mechanism, trigger_reason]
      properties:
        asset_id: { type: string, format: uuid }
        component: { type: string }
        damage_mechanism:
          type: string
          enum: [local_thin_area, crack_like_indication, dent_gouge, severe_corrosion, settlement_concern, out_of_roundness, brittle_fracture_concern, thickness_below_screening, engineering_review_required]
        trigger_source: { type: string, default: manual_finding }
        trigger_rule_id: { type: string }
        trigger_reason: { type: string }
        severity:
          type: string
          enum: [info, warning, blocking, critical]
        evidence_links:
          type: array
          items: { type: object }
        supporting_measurements:
          type: array
          items: { type: object }
        assigned_engineer: { type: string, format: uuid }
        due_date: { type: string, format: date }
        required_next_action: { type: string }

    RbiCaseCreateRequest:
      type: object
      required: [asset_id]
      additionalProperties: true
      properties:
        asset_id: { type: string, format: uuid }
        inspection_event_id: { type: string, format: uuid }
        calculation_run_id: { type: string, format: uuid }
        system: { type: string }
        component: { type: string }
        damage_mechanism: { type: string }
        probability_driver: { type: string }
        consequence_driver: { type: string }
        risk_category: { type: string }
        recommended_interval: { type: string }
        inspection_plan_reference: { type: string }
        evidence_links:
          type: array
          items: { type: object }
        input_placeholders:
          type: object
          properties:
            consequence_of_failure: { type: string }
            probability_of_failure: { type: string }
            damage_mechanism: { type: string }
            inspection_effectiveness: { type: string }
            fluid_service: { type: string }
            inventory: { type: string }
            operating_severity: { type: string }
            mitigation_controls: { type: string }
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: array
              items: { type: object }
    FormulaRegistryPayload:
      type: object
      required:
        - formula_id
        - formula_name
        - code_basis
        - code_edition
        - clause_reference
        - formula_type
        - expression_type
        - formula_expression_source
        - input_schema
        - output_schema
        - unit_rules
        - validation_rules
      properties:
        formula_id: { type: string }
        formula_name: { type: string }
        code_basis: { type: string }
        code_edition: { type: string }
        clause_reference:
          type: string
          description: Manual licensed reference only. Do not reproduce copyrighted clause text.
        component: { type: string }
        damage_mechanism: { type: string }
        formula_type:
          type: string
          enum: [universal_deterministic, api_controlled, rbi_rule, ffs_trigger, report_phrase_rule]
        expression_type:
          type: string
          enum: [none, controlled_placeholder, engineer_entered, json_logic, text_rule]
        expression_body:
          type: string
          description: Controlled placeholder unless entered by an authorized engineer from licensed sources or approved fixtures.
        formula_expression_source:
          type: string
          description: Required source traceability label, e.g. controlled_placeholder_manual_entry or licensed_engineer_entry reference.
        input_schema: { type: object }
        output_schema: { type: object }
        unit_rules: { type: object }
        validation_rules:
          oneOf:
            - type: object
            - type: array
        blocking_rules:
          type: array
          items: { type: string }
        test_case_reference: { type: string }
        status:
          type: string
          enum: [draft, under_review, approved, deprecated, locked]
        version: { type: string }
        effective_date: { type: string, format: date }
        locked_flag: { type: boolean }
    EngineeringValidationRequest:
      type: object
      additionalProperties: true
      properties:
        asset_id:
          type: string
          format: uuid
        validation_scope:
          type: string
          enum: [general, calculation_readiness, thickness_check, final_approval]
        asset:
          type: object
        geometry:
          type: object
        shell_courses:
          type: array
          items: { type: object }
        ndt_measurements:
          type: array
          items: { type: object }
        evidence_links:
          type: array
          items: { type: object }
        formula_registry:
          type: array
          items: { type: object }
        calculation_request:
          type: object
        approval_request:
          type: object

    EngineeringCalculationRequest:
      type: object
      required: [asset_id]
      additionalProperties: true
      properties:
        asset_id:
          type: string
          format: uuid
        inspection_event_id:
          type: string
          format: uuid
        formula_id:
          type: string
          default: AIM-UNIVERSAL-THICKNESS-CORROSION-ENGINE
        formula_version:
          type: string
        calculation_scope:
          type: string
          enum: [thickness_screening, corrosion_rate, remaining_life, inspection_interval_placeholder]
        calculation_request:
          type: object
          properties:
            thickness_check_requested: { type: boolean }
            retirement_thickness_mm: { type: number }
            controlled_formula_output: { type: object }
        thresholds:
          type: object
          properties:
            high_corrosion_rate_mm_per_year: { type: number }
            low_remaining_life_years: { type: number }
        context:
          type: object
          description: Optional validation/calculation context override. Stored data is loaded by asset_id when omitted.
    EngineeringCalculationResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            run_id: { type: string }
            run_status: { type: string }
            validation_status: { type: string, enum: [passed, blocked] }
            formula_set_version: { type: string }
            input_snapshot_hash: { type: string }
            output_summary: { type: object }
            calculation:
              type: object
              properties:
                deterministic_engine_version: { type: string }
                corrosion_rates:
                  type: array
                  items: { type: object }
                remaining_life:
                  type: array
                  items: { type: object }
                warnings:
                  type: array
                  items: { type: object }
        auditLogId: { type: string }

    RbiCaseCreateRequest:
      type: object
      required: [asset_id]
      additionalProperties: true
      properties:
        asset_id: { type: string, format: uuid }
        inspection_event_id: { type: string, format: uuid }
        calculation_run_id: { type: string, format: uuid }
        system: { type: string }
        component: { type: string }
        damage_mechanism: { type: string }
        probability_driver: { type: string }
        consequence_driver: { type: string }
        risk_category: { type: string }
        recommended_interval: { type: string }
        inspection_plan_reference: { type: string }
        evidence_links:
          type: array
          items: { type: object }
        input_placeholders:
          type: object
          properties:
            consequence_of_failure: { type: string }
            probability_of_failure: { type: string }
            damage_mechanism: { type: string }
            inspection_effectiveness: { type: string }
            fluid_service: { type: string }
            inventory: { type: string }
            operating_severity: { type: string }
            mitigation_controls: { type: string }
    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: array
              items: { type: object }


# Sprint 7 governance hardening notes
# Sprint 8.5 evidence linkage hardening: generic evidence_links rejects cross-asset links with CROSS_ASSET_EVIDENCE_LINK_BLOCKED.
# NDT approval cannot use linked evidence from another asset.
# FFS case creation rejects cross-asset evidence links with error code CROSS_ASSET_EVIDENCE_LINK_BLOCKED.
# Demo header authentication is local-development only; production deployments require verified JWT/session identity and DB-backed RBAC.

# Sprint 8 RBI interface governance notes
# RBI cases are qualitative/semi-quantitative placeholders unless approved quantitative Formula Registry rules are provided.
# No proprietary API RP 581 quantitative rules are embedded in this implementation.
