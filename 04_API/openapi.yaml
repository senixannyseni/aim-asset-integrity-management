        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      x-audit-event-generated: EVIDENCE_DELETE_REQUESTED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvidenceDeleteRequest'
      parameters:
      - in: path
        name: evidenceId
        required: true
        schema:
          type: string
          format: uuid
      tags:
      - Evidence
      x-source-of-truth-boundary: AIM is the system of record. Evidence is not deleted directly; linked evidence remains blocked from deletion.
      x-evidence-link-required: false
  /api/v1/evidence/{evidenceId}/delete-approve:
    post:
      summary: Approve or reject evidence deletion request; linked evidence deletion is blocked
      security:
      - bearerAuth: []
      x-permission-required: evidence.delete_approve
      responses:
        '200':
          description: Delete approval decision recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/GateBlocked'
      x-audit-event-generated: EVIDENCE_DELETE_APPROVED or LINKED_EVIDENCE_DELETE_BLOCKED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvidenceDeleteApprovalRequest'
      parameters:
      - in: path
        name: evidenceId
        required: true
        schema:
          type: string
          format: uuid
      tags:
      - Evidence
      x-source-of-truth-boundary: AIM is the system of record. Linked evidence lineage is retained and cannot be bypassed.
      x-evidence-link-required: true
      x-human-review-required: true
components:
  securitySchemes:
    DemoRoleHeaders:
      type: apiKey
      in: header
      name: x-aim-demo-roles
      description: Local/test-only demo header fallback. Production API uses bearerAuth.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthenticated:
      description: Authentication context is required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Required permission is missing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ValidationFailed:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    GateBlocked:
      description: Governance gate blocked the operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Requested entity not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    FfsCaseCreateRequest:
      type: object
      required:
      - asset_id
      - component
      - damage_mechanism
      - trigger_reason
      properties:
        asset_id:
          type: string
          format: uuid
        component:
          type: string
        damage_mechanism:
          type: string
          enum:
          - local_thin_area
          - crack_like_indication
          - dent_gouge
          - severe_corrosion
          - settlement_concern
          - out_of_roundness
          - brittle_fracture_concern
          - thickness_below_screening
          - engineering_review_required
        trigger_source:
          type: string
          default: manual_finding
        trigger_rule_id:
          type: string
        trigger_reason:
          type: string
        severity:
          type: string
          enum:
          - info
          - warning
          - blocking
          - critical
        evidence_links:
          type: array
          items:
            type: object
        supporting_measurements:
          type: array
          items:
            type: object
        assigned_engineer:
          type: string
          format: uuid
        due_date:
          type: string
          format: date
        required_next_action:
          type: string
    RbiCaseCreateRequest:
      type: object
      required:
      - asset_id
      additionalProperties: true
      properties:
        asset_id:
          type: string
          format: uuid
        inspection_event_id:
          type: string
          format: uuid
        calculation_run_id:
          type: string
          format: uuid
        system:
          type: string
        component:
          type: string
        damage_mechanism:
          type: string
        probability_driver:
          type: string
        consequence_driver:
          type: string
        risk_category:
          type: string
        recommended_interval:
          type: string
        inspection_plan_reference:
          type: string
        evidence_links:
          type: array
          items:
            type: object
        input_placeholders:
          type: object
          properties:
            consequence_of_failure:
              type: string
            probability_of_failure:
              type: string
            damage_mechanism:
              type: string
            inspection_effectiveness:
              type: string
            fluid_service:
              type: string
            inventory:
              type: string
            operating_severity:
              type: string
            mitigation_controls:
              type: string
    EngineeringReviewCreateRequest:
      type: object
      required:
      - entity_type
      - entity_id
      properties:
        entity_type:
          type: string
          enum:
          - asset
          - calculation_run
          - ndt_measurement
          - ffs_case
          - rbi_case
          - finding
        entity_id:
          type: string
          format: uuid
        review_type:
          type: string
        review_status:
          type: string
          enum:
          - draft
          - submitted_for_review
          - returned_for_revision
          - reviewed
          - submitted_for_approval
          - approved
          - rejected
          - locked
        checklist:
          type: object
        review_comment:
          type: string
    ApprovalRecordCreateRequest:
      type: object
      required:
      - entity_type
      - entity_id
      properties:
        review_id:
          type: string
          format: uuid
        entity_type:
          type: string
        entity_id:
          type: string
          format: uuid
        calculation_run_id:
          type: string
          format: uuid
        approval_type:
          type: string
          enum:
          - final_result
          - override
        checklist:
          type: object
        approval_comment:
          type: string
    ReportGenerateRequest:
      type: object
      required:
      - calculation_run_id
      properties:
        calculation_run_id:
          type: string
          format: uuid
        report_title:
          type: string
        output_formats:
          type: array
          items:
            type: string
            enum:
            - docx
            - pdf
      description: Generates a draft report only. Draft remains not approved until report.approve workflow is completed.
    GeneratedReport:
      type: object
      properties:
        report_id:
          type: string
          format: uuid
        report_code:
          type: string
        report_status:
          type: string
          enum:
          - draft
          - generated
          - under_review
          - approved
          - issued
          - superseded
          - rejected
        report_version:
          type: integer
        calculation_run_id:
          type: string
          format: uuid
        input_snapshot_hash:
          type: string
        traceability:
          type: object
        docx_object_path:
          type: string
        pdf_object_path:
          type: string
    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          required:
          - code
          - message
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
                additionalProperties: true
            requestId:
              type: string
              nullable: true
    FormulaRegistryPayload:
      type: object
      required:
      - formula_id
      - formula_name
      - code_basis
      - code_edition
      - clause_reference
      - formula_type
      - expression_type
      - formula_expression_source
      - input_schema
      - output_schema
      - unit_rules
      - validation_rules
      properties:
        formula_id:
          type: string
        formula_name:
          type: string
        code_basis:
          type: string
        code_edition:
          type: string
        clause_reference:
          type: string
          description: Manual licensed reference only. Do not reproduce copyrighted clause text.
        component:
          type: string
        damage_mechanism:
          type: string
        formula_type:
          type: string
          enum:
          - universal_deterministic
          - api_controlled
          - rbi_rule
          - ffs_trigger
          - report_phrase_rule
        expression_type:
          type: string
          enum:
          - none
          - controlled_placeholder
          - engineer_entered
          - json_logic
          - text_rule
        expression_body:
          type: string
          description: Controlled placeholder unless entered by an authorized engineer from licensed sources or approved fixtures.
        formula_expression_source:
          type: string
          description: Required source traceability label, e.g. controlled_placeholder_manual_entry or licensed_engineer_entry reference.
        input_schema:
          type: object
        output_schema:
          type: object
        unit_rules:
          type: object
        validation_rules:
          oneOf:
          - type: object
          - type: array
        blocking_rules:
          type: array
          items:
            type: string
        test_case_reference:
          type: string
        status:
          type: string
          enum:
          - draft
          - under_review
          - approved
          - deprecated
          - locked
        version:
          type: string
        effective_date:
          type: string
          format: date
        locked_flag:
          type: boolean
    EngineeringValidationRequest:
      type: object
      additionalProperties: true
      properties:
        asset_id:
          type: string
          format: uuid
        validation_scope:
          type: string
          enum:
          - general
          - calculation_readiness
          - thickness_check
          - final_approval
        asset:
          type: object
        geometry:
          type: object
        shell_courses:
          type: array
          items:
            type: object
        ndt_measurements:
          type: array
          items:
            type: object
        evidence_links:
          type: array
          items:
            type: object
        formula_registry:
          type: array
          items:
            type: object
        calculation_request:
          type: object
        approval_request:
          type: object
    EngineeringCalculationRequest:
      type: object
      required:
      - asset_id
      - formula_id
      - formula_version
      additionalProperties: true
      properties:
        asset_id:
          type: string
          format: uuid
        inspection_event_id:
          type: string
          format: uuid
        formula_id:
          type: string
          description: Explicit approved formula code. Silent/default formula selection is not allowed.
        formula_version:
          type: string
          description: Explicit approved formula version. Draft, under_review, retired, rejected, or missing versions are blocked.
        calculation_scope:
          type: string
          enum:
          - thickness_screening
          - corrosion_rate
          - remaining_life
          - inspection_interval_placeholder
        calculation_request:
          type: object
          properties:
            thickness_check_requested:
              type: boolean
            retirement_thickness_mm:
              type: number
            controlled_formula_output:
              type: object
        thresholds:
          type: object
          properties:
            high_corrosion_rate_mm_per_year:
              type: number
            low_remaining_life_years:
              type: number
        context:
          type: object
          description: Optional validation/calculation context override. Stored data is loaded by asset_id when omitted.
    EngineeringCalculationResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            run_id:
              type: string
            run_status:
              type: string
            validation_status:
              type: string
              enum:
              - passed
              - blocked
            formula_set_version:
              type: string
            formula_version_id:
              type: string
              format: uuid
            formula_version_snapshot:
              type: object
            input_snapshot_hash:
              type: string
            output_snapshot_hash:
              type: string
            output_summary:
              type: object
            output_snapshot:
              type: object
            final_use_status:
              type: string
              enum:
              - blocked
              - requires_engineering_review
              - approved_for_final_use
            final_use_disclaimer:
              type: string
              example: Engineering review required before final use.
            calculation:
              type: object
              properties:
                deterministic_engine_version:
                  type: string
                corrosion_rates:
                  type: array
                  items:
                    type: object
                remaining_life:
                  type: array
                  items:
                    type: object
                warnings:
                  type: array
                  items:
                    type: object
                final_use_status:
                  type: string
                final_use_blockers:
                  type: array
                  items:
                    type: string
                final_use_disclaimer:
                  type: string
                  example: Engineering review required before final use.
                output_snapshot_hash:
                  type: string
            formula_version:
              type: object
            final_use_disclaimer:
              type: string
              example: Engineering review required before final use.
        auditLogId:
          type: string
    ApiEnvelope:
      type: object
      properties:
        data:
          type: object
          additionalProperties: true
        auditLogId:
          type: string
          nullable: true
        requestId:
          type: string
          nullable: true
        mock:
          type: boolean
          default: false
    StandardResponse:
      type: object
      properties:
        data:
          type: object
          additionalProperties: true
        auditLogId:
          type: string
          nullable: true
    AuthLoginRequest:
      type: object
