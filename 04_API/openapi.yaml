openapi: 3.0.3
info:
  title: AIM Tank Integrity Implemented API Contract
  version: 0.2.5
  description: |
    Alignment and governance hardening contract for implemented endpoints only.
    This contract intentionally excludes AI extraction, NDT functional APIs, calculations, reports, and full evidence upload APIs because those sprints have not been applied yet.
servers:
  - url: http://localhost:4000
security:
  - DemoRoleHeader: []
tags:
  - name: Health
  - name: Assets
  - name: Geometry
  - name: Shell Courses
  - name: Materials
  - name: Workflow Events
  - name: Error Logs
paths:
  /health:
    get:
      tags: [Health]
      summary: Service health check
      description: Confirms API process health and that calculations are intentionally not implemented.
      x-permission-required: public
      x-audit-event-generated: none
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /health/db:
    get:
      tags: [Health]
      summary: Database connectivity check
      description: Checks PostgreSQL connectivity.
      x-permission-required: public
      x-audit-event-generated: none
      responses:
        '200':
          description: Database health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseHealthResponse'
  /api/v1/materials:
    get:
      tags: [Materials]
      summary: List active material master records
      x-permission-required: asset.read
      x-audit-event-generated: none
      responses:
        '200':
          description: Material list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Material'
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/assets:
    get:
      tags: [Assets]
      summary: List tank assets
      x-permission-required: asset.read
      x-audit-event-generated: none
      parameters:
        - in: query
          name: search
          schema: { type: string }
      responses:
        '200':
          description: Asset list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TankAsset'
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Assets]
      summary: Create tank asset
      x-permission-required: asset.create
      x-audit-event-generated: ASSET_CREATED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TankAssetCreateRequest'
            examples:
              create_asset:
                externalValue: ./api_payload_examples/create_asset.json
      responses:
        '201':
          description: Created asset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/assets/{assetId}:
    get:
      tags: [Assets]
      summary: Get tank asset bundle
      x-permission-required: asset.read
      x-audit-event-generated: none
      parameters:
        - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: Asset bundle
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/TankAssetBundle'
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Assets]
      summary: Update tank asset
      x-permission-required: asset.update
      x-audit-event-generated: ASSET_UPDATED
      parameters:
        - $ref: '#/components/parameters/AssetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TankAssetCreateRequest'
      responses:
        '200':
          description: Updated asset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Assets]
      summary: Soft delete tank asset
      x-permission-required: asset.delete
      x-audit-event-generated: ASSET_DELETED
      parameters:
        - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: Soft-deleted asset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/assets/{assetId}/geometry:
    get:
      tags: [Geometry]
      summary: Get tank geometry
      x-permission-required: asset.read
      x-audit-event-generated: none
      parameters:
        - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: Geometry record
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    nullable: true
                    allOf:
                      - $ref: '#/components/schemas/TankGeometry'
    put:
      tags: [Geometry]
      summary: Upsert tank geometry
      x-permission-required: asset.update
      x-audit-event-generated: TANK_GEOMETRY_CREATED or TANK_GEOMETRY_UPDATED
      parameters:
        - $ref: '#/components/parameters/AssetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TankGeometryUpsertRequest'
            examples:
              upsert_geometry:
                externalValue: ./api_payload_examples/upsert_geometry.json
      responses:
        '200':
          description: Geometry upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/assets/{assetId}/shell-courses:
    get:
      tags: [Shell Courses]
      summary: List shell courses for asset
      x-permission-required: asset.read
      x-audit-event-generated: none
      parameters:
        - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: Shell course list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ShellCourse'
    post:
      tags: [Shell Courses]
      summary: Create shell course
      x-permission-required: asset.update
      x-audit-event-generated: SHELL_COURSE_CREATED
      parameters:
        - $ref: '#/components/parameters/AssetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShellCourseRequest'
            examples:
              create_shell_course:
                externalValue: ./api_payload_examples/create_shell_course.json
      responses:
        '201':
          description: Shell course created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '400': { $ref: '#/components/responses/ValidationFailed' }
  /api/v1/assets/{assetId}/shell-courses/{courseId}:
    patch:
      tags: [Shell Courses]
      summary: Update shell course
      x-permission-required: asset.update
      x-audit-event-generated: SHELL_COURSE_UPDATED
      parameters:
        - $ref: '#/components/parameters/AssetId'
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShellCourseRequest'
      responses:
        '200':
          description: Shell course updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Shell Courses]
      summary: Delete shell course
      x-permission-required: asset.update
      x-audit-event-generated: SHELL_COURSE_DELETED
      parameters:
        - $ref: '#/components/parameters/AssetId'
        - $ref: '#/components/parameters/CourseId'
      responses:
        '200':
          description: Shell course deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
  /api/v1/workflow-events:
    post:
      tags: [Workflow Events]
      summary: Record workflow orchestration event
      description: n8n may call this AIM backend API. It must not write directly to PostgreSQL.
      x-permission-required: workflow_event.create
      x-audit-event-generated: WORKFLOW_EVENT_RECEIVED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowEventRequest'
            examples:
              workflow_event:
                externalValue: ./api_payload_examples/workflow_event.json
      responses:
        '201':
          description: Workflow event recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '400': { $ref: '#/components/responses/ValidationFailed' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/v1/error-logs:
    get:
      tags: [Error Logs]
      summary: List error logs
      x-permission-required: error_log.read
      x-audit-event-generated: none
      responses:
        '200':
          description: Error log list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorLog'
    post:
      tags: [Error Logs]
      summary: Create error log
      x-permission-required: error_log.create
      x-audit-event-generated: ERROR_LOG_CREATED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorLogRequest'
            examples:
              error_log:
                externalValue: ./api_payload_examples/error_log.json
      responses:
        '201':
          description: Error log recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '400': { $ref: '#/components/responses/ValidationFailed' }
components:
  securitySchemes:
    DemoRoleHeader:
      type: apiKey
      in: header
      name: x-aim-demo-roles
      description: Local development only. Real auth/session must replace this before UAT.
  parameters:
    AssetId:
      name: assetId
      in: path
      required: true
      schema: { type: string, format: uuid }
    CourseId:
      name: courseId
      in: path
      required: true
      schema: { type: string, format: uuid }
  responses:
    ValidationFailed:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthenticated:
      description: Missing auth context
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Entity not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthResponse:
      type: object
      properties:
        status: { type: string }
        service: { type: string }
        sprint: { type: string }
        calculationsImplemented: { type: boolean }
    DatabaseHealthResponse:
      type: object
      properties:
        status: { type: string }
        database: { type: string }
        serverTime: { type: string }
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: array
              items:
                type: object
    MutationResponse:
      type: object
      properties:
        data: { type: object }
        auditLogId: { type: string, nullable: true }
    TankAsset:
      type: object
      properties:
        asset_id: { type: string, format: uuid }
        tank_tag: { type: string }
        asset_name: { type: string }
        facility: { type: string }
        location: { type: string }
        service_fluid: { type: string }
        tank_type: { type: string }
        construction_year: { type: integer }
        original_design_code: { type: string }
        current_assessment_code: { type: string }
        code_edition: { type: string }
        owner: { type: string }
        operating_status: { type: string }
        inspection_due_date: { type: string, format: date }
        record_status: { type: string }
    TankAssetCreateRequest:
      type: object
      required: [tank_tag, asset_name, facility, location, service_fluid, tank_type, construction_year, original_design_code, current_assessment_code, code_edition, owner, operating_status, inspection_due_date]
      properties:
        tank_tag: { type: string }
        asset_name: { type: string }
        facility: { type: string }
        location: { type: string }
        service_fluid: { type: string }
        tank_type: { type: string }
        construction_year: { type: integer }
        original_design_code: { type: string }
        current_assessment_code: { type: string }
        code_edition: { type: string }
        owner: { type: string }
        operating_status: { type: string, enum: [in_service, out_of_service, mothballed, retired] }
        inspection_due_date: { type: string, format: date }
    TankAssetBundle:
      allOf:
        - $ref: '#/components/schemas/TankAsset'
        - type: object
          properties:
            geometry:
              nullable: true
              allOf:
                - $ref: '#/components/schemas/TankGeometry'
            shell_courses:
              type: array
              items:
                $ref: '#/components/schemas/ShellCourse'
    TankGeometry:
      type: object
      properties:
        geometry_id: { type: string, format: uuid }
        asset_id: { type: string, format: uuid }
        diameter: { type: number, description: stored internally in meters }
        shell_height: { type: number, description: stored internally in meters }
        number_of_courses: { type: integer }
        design_liquid_level: { type: number, description: stored internally in meters }
        nominal_capacity: { type: number, description: m3 }
        specific_gravity: { type: number }
        design_temperature: { type: number, description: deg C }
        design_pressure: { type: number, description: kPa }
        vacuum_design_basis: { type: string }
        bottom_type: { type: string }
        roof_type: { type: string }
        foundation_type: { type: string }
    TankGeometryUpsertRequest:
      type: object
      required: [diameter, shell_height, number_of_courses, design_liquid_level, nominal_capacity, specific_gravity, design_temperature, design_pressure, vacuum_design_basis, bottom_type, roof_type, foundation_type]
      properties:
        diameter: { type: number }
        diameter_unit: { type: string, enum: [m, mm] }
        shell_height: { type: number }
        shell_height_unit: { type: string, enum: [m, mm] }
        number_of_courses: { type: integer }
        design_liquid_level: { type: number }
        design_liquid_level_unit: { type: string, enum: [m, mm] }
        nominal_capacity: { type: number }
        specific_gravity: { type: number }
        design_temperature: { type: number }
        design_pressure: { type: number }
        vacuum_design_basis: { type: string }
        bottom_type: { type: string }
        roof_type: { type: string }
        foundation_type: { type: string }
        construction_year: { type: integer }
    ShellCourse:
      type: object
      properties:
        shell_course_id: { type: string, format: uuid }
        asset_id: { type: string, format: uuid }
        course_no: { type: integer }
        course_height: { type: number, description: displayed in meters }
        course_height_mm: { type: number, description: stored internally in mm }
        nominal_thickness: { type: number, description: mm }
        measured_min_thickness: { type: number, description: mm }
        material_id: { type: string, format: uuid }
        material_code: { type: string }
        material_specification: { type: string }
        joint_efficiency: { type: number }
        corrosion_allowance: { type: number, description: mm }
        coating_lining_status: { type: string }
    ShellCourseRequest:
      type: object
      required: [course_no, course_height, course_height_unit, nominal_thickness, measured_min_thickness, material_id, material_specification, joint_efficiency, corrosion_allowance, coating_lining_status]
      properties:
        course_no: { type: integer }
        course_height: { type: number }
        course_height_unit: { type: string, enum: [m, mm] }
        nominal_thickness: { type: number }
        measured_min_thickness: { type: number }
        material_id: { type: string, format: uuid }
        material_specification: { type: string }
        joint_efficiency: { type: number, minimum: 0, maximum: 1 }
        corrosion_allowance: { type: number }
        coating_lining_status: { type: string }
    Material:
      type: object
      properties:
        material_id: { type: string, format: uuid }
        material_code: { type: string }
        material_name: { type: string }
        material_specification: { type: string }
        material_family: { type: string }
        is_active: { type: boolean }
    WorkflowEventRequest:
      type: object
      required: [workflow_id, event_type]
      properties:
        workflow_event_code: { type: string }
        workflow_id: { type: string }
        workflow_name: { type: string }
        event_type: { type: string }
        event_status: { type: string }
        source_system: { type: string, default: n8n }
        related_entity_type: { type: string }
        related_entity_id: { type: string, format: uuid }
        payload: { type: object }
    ErrorLog:
      type: object
      properties:
        error_log_id: { type: string, format: uuid }
        error_code: { type: string }
        error_message: { type: string }
        severity: { type: string }
        source_module: { type: string }
        status: { type: string }
    ErrorLogRequest:
      type: object
      required: [error_code, error_message, source_module]
      properties:
        error_code: { type: string }
        error_message: { type: string }
        severity: { type: string, enum: [low, medium, high, critical] }
        source_module: { type: string }
        source_system: { type: string }
        related_entity_type: { type: string }
        related_entity_id: { type: string, format: uuid }
        workflow_event_id: { type: string, format: uuid }
        request_id: { type: string }
        payload: { type: object }
